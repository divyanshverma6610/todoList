<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Public Todo Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ── Design tokens ────────────────────────────────────── */
    :root {
      --bg:        #F5F0EB;
      --surface:   #FFFDF9;
      --border:    #E8E0D5;
      --accent:    #C5603A;
      --accent-lt: #F2E4DC;
      --text:      #2B2217;
      --muted:     #9B8E84;
      --shadow:    0 2px 12px rgba(43,34,23,.07);
      --radius:    16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 16px 80px;
    }

    /* ── Page wrapper ─────────────────────────────────────── */
    .container {
      max-width: 620px;
      margin: 0 auto;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text);
    }
    header h1 span { color: var(--accent); font-style: italic; }
    header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
    }

    /* ── Add-todo card ────────────────────────────────────── */
    .add-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 24px 20px;
      margin-bottom: 32px;
    }

    .add-card label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .add-card input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 14px;
    }
    .add-card input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-lt);
    }
    .add-card input::placeholder { color: var(--muted); }

    /* ── Button ───────────────────────────────────────────── */
    #add-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: .02em;
      transition: background .2s, transform .12s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    #add-btn:hover { background: #b0532e; box-shadow: 0 4px 14px rgba(197,96,58,.35); }
    #add-btn:active { transform: scale(.98); }
    #add-btn:disabled { background: var(--muted); cursor: not-allowed; box-shadow: none; }

    /* spinner inside button */
    #add-btn .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 0 auto;
    }
    #add-btn.loading .btn-text { display: none; }
    #add-btn.loading .spinner  { display: block; }

    /* ── Error message ────────────────────────────────────── */
    .error-msg {
      display: none;
      font-size: 0.8rem;
      color: var(--accent);
      margin-top: -8px;
      margin-bottom: 10px;
      padding-left: 4px;
    }
    .error-msg.show { display: block; }

    /* ── Todo list section ────────────────────────────────── */
    .list-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .list-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
    }
    #count-badge {
      background: var(--accent-lt);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 20px;
    }

    /* ── Empty state ──────────────────────────────────────── */
    #empty-state {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
    }
    #empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
    #empty-state p { font-size: 0.9rem; }

    /* ── Loading skeleton ─────────────────────────────────── */
    #loading-state {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .skeleton-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(90deg, var(--border) 25%, #f0ebe4 50%, var(--border) 75%);
      background-size: 200%;
      animation: shimmer 1.4s infinite;
      flex-shrink: 0;
    }
    .skeleton-lines { flex: 1; }
    .skeleton-line {
      height: 10px;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--border) 25%, #f0ebe4 50%, var(--border) 75%);
      background-size: 200%;
      animation: shimmer 1.4s infinite;
      margin-bottom: 8px;
    }
    .skeleton-line.short { width: 55%; }
    .skeleton-line.long  { width: 88%; }
    .skeleton-line.tiny  { width: 35%; margin-bottom: 0; }

    /* ── Todo card ────────────────────────────────────────── */
    #todo-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .todo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      box-shadow: var(--shadow);
      animation: slideIn .28s cubic-bezier(.22,1,.36,1);
    }

    /* avatar */
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
      letter-spacing: .03em;
    }

    .todo-body { flex: 1; min-width: 0; }

    .todo-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 5px;
    }
    .todo-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
    }
    .todo-time {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .todo-text {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.5;
      word-break: break-word;
    }

    /* ── Keyframes ────────────────────────────────────────── */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes shimmer {
      to { background-position: -200% 0; }
    }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 480px) {
      .add-card { padding: 18px 16px 16px; }
      .todo-card { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- ── Header ── -->
  <header>
    <h1>Public <span>Todo</span> Board</h1>
    <p>Add a todo — everyone sees it, instantly.</p>
  </header>

  <!-- ── Add Todo Card ── -->
  <div class="add-card">
    <label for="name-input">Your name</label>
    <input id="name-input" type="text" placeholder="e.g. Alex" maxlength="40" autocomplete="off" />

    <label for="todo-input">Your todo</label>
    <input id="todo-input" type="text" placeholder="e.g. Buy groceries" maxlength="200" autocomplete="off" />

    <p class="error-msg" id="error-msg">Please fill in both fields.</p>

    <button id="add-btn">
      <span class="btn-text">Add Todo</span>
      <span class="spinner"></span>
    </button>
  </div>

  <!-- ── Todo List ── -->
  <div class="list-header">
    <h2>All Todos</h2>
    <span id="count-badge">0</span>
  </div>

  <!-- Skeleton shown while first load -->
  <div id="loading-state">
    <div class="skeleton" aria-hidden="true">
      <div class="skeleton-avatar"></div>
      <div class="skeleton-lines">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line long"></div>
        <div class="skeleton-line tiny"></div>
      </div>
    </div>
    <div class="skeleton" aria-hidden="true">
      <div class="skeleton-avatar"></div>
      <div class="skeleton-lines">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line long"></div>
        <div class="skeleton-line tiny"></div>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div id="empty-state" style="display:none;">
    <div class="icon">📋</div>
    <p>No todos yet — be the first to add one!</p>
  </div>

  <!-- Live list -->
  <div id="todo-list" style="display:none;"></div>

</div>

<!-- ── Firebase v10 modular SDK via CDN ── -->
<script type="module">
  import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore,
           collection, addDoc,
           query, orderBy,
           onSnapshot,
           serverTimestamp }         from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  🔥 REPLACE WITH YOUR FIREBASE CONFIG
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const firebaseConfig = {
    apiKey:            "AIzaSyC0bclkhN_utuBlbwDQKwQdDOj6qyKIqQM",
    authDomain:        "todo-list-e14ce.firebaseapp.com",
    projectId:         "todo-list-e14ce",
    storageBucket:     "todo-list-e14ce.firebasestorage.app",
    messagingSenderId: "518681964626",
    appId:             "1:518681964626:web:90916ba9b9f2246cb16f8b",
    measurementId:     "G-0LF5X4S72W"
  };
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  // ── Init Firebase ──────────────────────────────────────────
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const todosRef = collection(db, "todos");

  // ── DOM refs ───────────────────────────────────────────────
  const nameInput    = document.getElementById("name-input");
  const todoInput    = document.getElementById("todo-input");
  const addBtn       = document.getElementById("add-btn");
  const errorMsg     = document.getElementById("error-msg");
  const todoList     = document.getElementById("todo-list");
  const emptyState   = document.getElementById("empty-state");
  const loadingState = document.getElementById("loading-state");
  const countBadge   = document.getElementById("count-badge");

  // ── Avatar colour palette ─────────────────────────────────
  const AVATAR_COLORS = [
    "#C5603A","#3A7DC5","#5BA85B","#9B59B6",
    "#E67E22","#1ABC9C","#C0392B","#2980B9"
  ];

  /** Deterministic color from name string */
  function colorFromName(name) {
    let hash = 0;
    for (const ch of name) hash = ch.charCodeAt(0) + ((hash << 5) - hash);
    return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
  }

  /** Get initials (up to 2 chars) from a name */
  function initials(name) {
    const parts = name.trim().split(/\s+/);
    return (parts[0][0] + (parts[1]?.[0] ?? "")).toUpperCase();
  }

  /** Relative time string */
  function timeAgo(date) {
    if (!date) return "just now";
    const secs = Math.floor((Date.now() - date.getTime()) / 1000);
    if (secs < 5)   return "just now";
    if (secs < 60)  return `${secs}s ago`;
    const mins = Math.floor(secs / 60);
    if (mins < 60)  return `${mins} min${mins > 1 ? "s" : ""} ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)   return `${hrs} hr${hrs > 1 ? "s" : ""} ago`;
    const days = Math.floor(hrs / 24);
    return `${days} day${days > 1 ? "s" : ""} ago`;
  }

  /** Build a single todo card element */
  function buildCard(id, data) {
    const { name, text, createdAt } = data;
    const date = createdAt?.toDate?.() ?? null;

    const card = document.createElement("div");
    card.className = "todo-card";
    card.dataset.id = id;

    const color = colorFromName(name);
    const inits  = initials(name);

    card.innerHTML = `
      <div class="avatar" style="background:${color}" title="${name}">${inits}</div>
      <div class="todo-body">
        <div class="todo-meta">
          <span class="todo-name">${escHtml(name)}</span>
          <span class="todo-time" data-ts="${date?.toISOString() ?? ""}">${timeAgo(date)}</span>
        </div>
        <p class="todo-text">${escHtml(text)}</p>
      </div>`;

    return card;
  }

  /** Simple HTML-escape to prevent XSS */
  function escHtml(str) {
    return str
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  // ── Real-time listener ─────────────────────────────────────
  let firstLoad = true;

  const q = query(todosRef, orderBy("createdAt", "desc"));

  onSnapshot(q, (snapshot) => {
    // Hide skeleton on first data arrival
    if (firstLoad) {
      loadingState.style.display = "none";
      firstLoad = false;
    }

    const todos = snapshot.docs;

    // Update badge
    countBadge.textContent = todos.length;

    if (todos.length === 0) {
      emptyState.style.display = "block";
      todoList.style.display   = "none";
      return;
    }

    emptyState.style.display = "none";
    todoList.style.display   = "flex";

    // Rebuild list
    todoList.innerHTML = "";
    todos.forEach(doc => {
      todoList.appendChild(buildCard(doc.id, doc.data()));
    });
  });

  // ── Refresh timestamps every 30 s ────────────────────────
  setInterval(() => {
    document.querySelectorAll(".todo-time[data-ts]").forEach(el => {
      const iso = el.dataset.ts;
      el.textContent = iso ? timeAgo(new Date(iso)) : "just now";
    });
  }, 30_000);

  // ── Add todo ───────────────────────────────────────────────
  addBtn.addEventListener("click", async () => {
    const name = nameInput.value.trim();
    const text = todoInput.value.trim();

    // Validation
    if (!name || !text) {
      errorMsg.classList.add("show");
      (!name ? nameInput : todoInput).focus();
      return;
    }
    errorMsg.classList.remove("show");

    // Loading state
    addBtn.disabled = true;
    addBtn.classList.add("loading");

    try {
      await addDoc(todosRef, {
        name,
        text,
        createdAt: serverTimestamp()
      });

      // Clear inputs
      todoInput.value = "";
      todoInput.focus();
    } catch (err) {
      console.error("Error adding todo:", err);
      alert("Couldn't save your todo. Check your Firebase config.");
    } finally {
      addBtn.disabled = false;
      addBtn.classList.remove("loading");
    }
  });

  // ── Submit on Enter key ────────────────────────────────────
  [nameInput, todoInput].forEach(input => {
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") addBtn.click();
    });
  });

  // ── Hide error on typing ───────────────────────────────────
  [nameInput, todoInput].forEach(input => {
    input.addEventListener("input", () => errorMsg.classList.remove("show"));
  });
</script>

</body>
</html>
