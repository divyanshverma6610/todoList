<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Public Todo Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #F5F0EB;
      --surface:   #FFFDF9;
      --border:    #E8E0D5;
      --accent:    #C5603A;
      --accent-lt: #F2E4DC;
      --text:      #2B2217;
      --muted:     #9B8E84;
      --shadow:    0 2px 12px rgba(43,34,23,.07);
      --radius:    16px;
      --danger:    #e53e3e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ══ AUTH ════════════════════════════════════════════════ */
    #auth-screen {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 24px 16px;
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; box-shadow: 0 8px 40px rgba(43,34,23,.12);
      padding: 40px 36px 36px; width: 100%; max-width: 420px;
      animation: fadeUp .4s cubic-bezier(.22,1,.36,1);
    }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo .logo-icon {
      width: 52px; height: 52px; background: var(--accent); border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin-bottom: 12px;
    }
    .auth-logo h1 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; letter-spacing: -0.02em; }
    .auth-logo h1 span { color: var(--accent); font-style: italic; }
    .auth-logo p { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

    /* Google button */
    .google-btn {
      width: 100%; padding: 12px; background: var(--surface);
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: inherit; font-size: 0.92rem; font-weight: 600;
      color: var(--text); cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 10px;
      transition: border-color .2s, box-shadow .2s, background .2s;
      margin-bottom: 6px;
    }
    .google-btn:hover { border-color: #4285F4; box-shadow: 0 2px 10px rgba(66,133,244,.2); background: #f8f9ff; }
    .google-btn svg { flex-shrink: 0; }

    /* Divider */
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0; color: var(--muted); font-size: 0.78rem;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Tabs */
    .auth-tabs {
      display: flex; background: var(--bg); border-radius: 10px;
      padding: 4px; margin-bottom: 20px;
    }
    .auth-tab {
      flex: 1; padding: 9px; border: none; background: transparent;
      border-radius: 8px; font-family: inherit; font-size: 0.875rem;
      font-weight: 500; color: var(--muted); cursor: pointer; transition: all .2s;
    }
    .auth-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 6px rgba(43,34,23,.1); }

    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-group label {
      font-size: 0.72rem; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted);
    }
    .field-group input {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 11px 14px; font-family: inherit; font-size: 0.95rem;
      color: var(--text); background: var(--bg); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-lt); }
    .field-group input::placeholder { color: var(--muted); }

    .auth-btn {
      width: 100%; padding: 13px; background: var(--accent); color: #fff;
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background .2s, transform .12s, box-shadow .2s; margin-top: 4px;
    }
    .auth-btn:hover { background: #b0532e; box-shadow: 0 4px 14px rgba(197,96,58,.35); }
    .auth-btn:active { transform: scale(.98); }
    .auth-btn:disabled { background: var(--muted); cursor: not-allowed; box-shadow: none; }
    .auth-btn .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto;
    }
    .auth-btn.loading .btn-text { display: none; }
    .auth-btn.loading .spinner  { display: block; }

    .auth-error {
      display: none; background: #fff5f5; border: 1px solid #fed7d7;
      color: var(--danger); font-size: 0.82rem; padding: 10px 14px;
      border-radius: 8px; text-align: center;
    }
    .auth-error.show { display: block; }
    .auth-divider { text-align: center; font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
    .auth-divider a { color: var(--accent); text-decoration: none; font-weight: 600; }

    /* ══ APP ═════════════════════════════════════════════════ */
    #app-screen { display: none; padding: 40px 16px 80px; }
    .container  { max-width: 620px; margin: 0 auto; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; padding: 10px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: var(--shadow);
    }
    .topbar-user { display: flex; align-items: center; gap: 10px; }
    .topbar-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700; color: #fff; flex-shrink: 0;
      overflow: hidden;
    }
    .topbar-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .topbar-info { display: flex; flex-direction: column; }
    .topbar-name  { font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .topbar-email { font-size: 0.75rem; color: var(--muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn {
      font-size: 0.8rem; font-weight: 600; color: var(--muted);
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 5px 12px; cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .logout-btn:hover { color: var(--accent); border-color: var(--accent); }

    header { text-align: center; margin-bottom: 40px; }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 3rem); letter-spacing: -0.02em; line-height: 1.1;
    }
    header h1 span { color: var(--accent); font-style: italic; }
    header p { margin-top: 8px; color: var(--muted); font-size: 0.9rem; font-weight: 300; }

    .add-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 24px 24px 20px; margin-bottom: 32px;
    }
    .add-card label {
      display: block; font-size: 0.72rem; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    .add-card input {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 11px 14px; font-family: inherit; font-size: 0.95rem;
      color: var(--text); background: var(--bg); outline: none;
      transition: border-color .2s, box-shadow .2s; margin-bottom: 14px;
    }
    .add-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-lt); }
    .add-card input::placeholder { color: var(--muted); }

    #add-btn {
      width: 100%; padding: 13px; background: var(--accent); color: #fff;
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background .2s, transform .12s, box-shadow .2s;
    }
    #add-btn:hover { background: #b0532e; box-shadow: 0 4px 14px rgba(197,96,58,.35); }
    #add-btn:active { transform: scale(.98); }
    #add-btn:disabled { background: var(--muted); cursor: not-allowed; }
    #add-btn .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto;
    }
    #add-btn.loading .btn-text { display: none; }
    #add-btn.loading .spinner  { display: block; }

    .error-msg { display: none; font-size: 0.8rem; color: var(--accent); margin-top: -8px; margin-bottom: 10px; padding-left: 4px; }
    .error-msg.show { display: block; }

    .list-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .list-header h2 { font-family: 'DM Serif Display', serif; font-size: 1.15rem; }
    #count-badge { background: var(--accent-lt); color: var(--accent); font-size: 0.75rem; font-weight: 600; padding: 2px 9px; border-radius: 20px; }

    #empty-state { text-align: center; padding: 48px 0; color: var(--muted); }
    #empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

    #loading-state { display: flex; flex-direction: column; gap: 12px; }
    .skeleton { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; display: flex; align-items: flex-start; gap: 14px; }
    .skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(90deg, var(--border) 25%, #f0ebe4 50%, var(--border) 75%); background-size: 200%; animation: shimmer 1.4s infinite; }
    .skeleton-lines { flex: 1; }
    .skeleton-line { height: 10px; border-radius: 6px; background: linear-gradient(90deg, var(--border) 25%, #f0ebe4 50%, var(--border) 75%); background-size: 200%; animation: shimmer 1.4s infinite; margin-bottom: 8px; }
    .skeleton-line.short { width: 55%; } .skeleton-line.long { width: 88%; } .skeleton-line.tiny { width: 35%; margin-bottom: 0; }

    #todo-list { display: flex; flex-direction: column; gap: 12px; }
    .todo-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      display: flex; align-items: flex-start; gap: 14px;
      box-shadow: var(--shadow); animation: slideIn .28s cubic-bezier(.22,1,.36,1);
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; color: #fff; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .todo-body { flex: 1; min-width: 0; }
    .todo-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; }
    .todo-name { font-weight: 600; font-size: 0.9rem; }
    .todo-time { font-size: 0.75rem; color: var(--muted); }
    .todo-text { font-size: 0.95rem; line-height: 1.5; word-break: break-word; }

    @keyframes fadeUp  { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes shimmer { to { background-position: -200% 0; } }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px 24px; }
      .add-card  { padding: 18px 16px 16px; }
      .todo-card { padding: 14px 16px; }
      .topbar-email { max-width: 120px; }
    }
  </style>
</head>
<body>

<!-- ══ AUTH SCREEN ════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">📋</div>
      <h1>Public <span>Todo</span> Board</h1>
      <p>Sign in to add todos visible to everyone</p>
    </div>

    <!-- Google Sign-In -->
    <button class="google-btn" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.706c-.18-.54-.282-1.117-.282-1.706s.102-1.166.282-1.706V4.962H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.038l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 6.294C4.672 4.167 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </button>

    <div class="or-divider">or</div>

    <!-- Error -->
    <div class="auth-error" id="auth-error"></div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"  onclick="switchTab('login')">Login</button>
      <button class="auth-tab"        id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login form -->
    <div class="auth-form" id="login-form">
      <div class="field-group">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field-group">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="auth-btn" id="login-btn" onclick="handleLogin()">
        <span class="btn-text">Login</span>
        <span class="spinner"></span>
      </button>
      <p class="auth-divider">No account? <a href="#" onclick="switchTab('signup')">Sign up free</a></p>
    </div>

    <!-- Signup form -->
    <div class="auth-form" id="signup-form" style="display:none;">
      <div class="field-group">
        <label for="signup-name">Your Name</label>
        <input id="signup-name" type="text" placeholder="e.g. Alex" maxlength="40" autocomplete="name" />
      </div>
      <div class="field-group">
        <label for="signup-email">Email</label>
        <input id="signup-email" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field-group">
        <label for="signup-password">Password</label>
        <input id="signup-password" type="password" placeholder="Min. 6 characters" autocomplete="new-password" />
      </div>
      <button class="auth-btn" id="signup-btn" onclick="handleSignup()">
        <span class="btn-text">Create Account</span>
        <span class="spinner"></span>
      </button>
      <p class="auth-divider">Already have an account? <a href="#" onclick="switchTab('login')">Login</a></p>
    </div>

  </div>
</div>

<!-- ══ APP SCREEN ════════════════════════════════════════ -->
<div id="app-screen">
  <div class="container">

    <div class="topbar">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-info">
          <span class="topbar-name"  id="topbar-name"></span>
          <span class="topbar-email" id="topbar-email"></span>
        </div>
      </div>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>

    <header>
      <h1>Public <span>Todo</span> Board</h1>
      <p>Add a todo — everyone sees it, instantly.</p>
    </header>

    <div class="add-card">
      <label for="todo-input">Your todo</label>
      <input id="todo-input" type="text" placeholder="e.g. Buy groceries" maxlength="200" autocomplete="off" />
      <p class="error-msg" id="error-msg">Please write a todo first.</p>
      <button id="add-btn" onclick="handleAddTodo()">
        <span class="btn-text">Add Todo</span>
        <span class="spinner"></span>
      </button>
    </div>

    <div class="list-header">
      <h2>All Todos</h2>
      <span id="count-badge">0</span>
    </div>

    <div id="loading-state">
      <div class="skeleton"><div class="skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton-line short"></div><div class="skeleton-line long"></div><div class="skeleton-line tiny"></div></div></div>
      <div class="skeleton"><div class="skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton-line short"></div><div class="skeleton-line long"></div><div class="skeleton-line tiny"></div></div></div>
    </div>

    <div id="empty-state" style="display:none;">
      <div class="icon">📋</div>
      <p>No todos yet — be the first to add one!</p>
    </div>

    <div id="todo-list" style="display:none;"></div>

  </div>
</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, doc }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
           signOut, onAuthStateChanged, updateProfile, GoogleAuthProvider, signInWithPopup }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // ── Firebase config ─────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyC0bclkhN_utuBlbwDQKwQdDOj6qyKIqQM",
    authDomain:        "todo-list-e14ce.firebaseapp.com",
    projectId:         "todo-list-e14ce",
    storageBucket:     "todo-list-e14ce.firebasestorage.app",
    messagingSenderId: "518681964626",
    appId:             "1:518681964626:web:90916ba9b9f2246cb16f8b",
    measurementId:     "G-0LF5X4S72W"
  };

  const app      = initializeApp(firebaseConfig);
  const db       = getFirestore(app);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();
  const todosRef = collection(db, "todos");

  // ── DOM ──────────────────────────────────────────────────
  const authScreen   = document.getElementById("auth-screen");
  const appScreen    = document.getElementById("app-screen");
  const authError    = document.getElementById("auth-error");
  const todoInput    = document.getElementById("todo-input");
  const addBtn       = document.getElementById("add-btn");
  const errorMsg     = document.getElementById("error-msg");
  const todoList     = document.getElementById("todo-list");
  const emptyState   = document.getElementById("empty-state");
  const loadingState = document.getElementById("loading-state");
  const countBadge   = document.getElementById("count-badge");

  // ── Helpers ──────────────────────────────────────────────
  const COLORS = ["#C5603A","#3A7DC5","#5BA85B","#9B59B6","#E67E22","#1ABC9C","#C0392B","#2980B9"];
  function colorFrom(s) {
    let h = 0; for (const c of s) h = c.charCodeAt(0) + ((h << 5) - h);
    return COLORS[Math.abs(h) % COLORS.length];
  }
  function initials(name) {
    const p = name.trim().split(/\s+/);
    return (p[0][0] + (p[1]?.[0] ?? "")).toUpperCase();
  }
  function timeAgo(d) {
    if (!d) return "just now";
    const s = Math.floor((Date.now() - d.getTime()) / 1000);
    if (s < 5) return "just now";
    if (s < 60) return `${s}s ago`;
    const m = Math.floor(s/60); if (m < 60) return `${m} min${m>1?"s":""} ago`;
    const hr = Math.floor(m/60); if (hr < 24) return `${hr} hr${hr>1?"s":""} ago`;
    const dy = Math.floor(hr/24); return `${dy} day${dy>1?"s":""} ago`;
  }
  function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  // ── Auth state ───────────────────────────────────────────
  let unsubTodos = null, firstLoad = true;

  onAuthStateChanged(auth, user => {
    if (user) {
      authScreen.style.display = "none";
      appScreen.style.display  = "block";

      const name  = user.displayName || user.email.split("@")[0];
      const photo = user.photoURL;
      document.getElementById("topbar-name").textContent  = name;
      document.getElementById("topbar-email").textContent = user.email;

      const av = document.getElementById("topbar-avatar");
      if (photo) {
        av.innerHTML = `<img src="${photo}" alt="${esc(name)}" referrerpolicy="no-referrer">`;
      } else {
        av.style.background = colorFrom(name);
        av.textContent = initials(name);
      }

      firstLoad = true;
      const q = query(todosRef, orderBy("createdAt", "desc"));
      unsubTodos = onSnapshot(q, snap => {
        if (firstLoad) { loadingState.style.display = "none"; firstLoad = false; }
        countBadge.textContent = snap.docs.length;
        if (snap.docs.length === 0) {
          emptyState.style.display = "block"; todoList.style.display = "none"; return;
        }
        emptyState.style.display = "none"; todoList.style.display = "flex";
        todoList.innerHTML = "";
        snap.docs.forEach(d => todoList.appendChild(buildCard(d.id, d.data())));
      });
    } else {
      authScreen.style.display = "flex"; appScreen.style.display = "none";
      if (unsubTodos) { unsubTodos(); unsubTodos = null; }
      loadingState.style.display = "flex"; todoList.style.display = "none";
      emptyState.style.display = "none"; firstLoad = true;
    }
  });

  // ── Build card ───────────────────────────────────────────
  function buildCard(id, data) {
  const { name, text, createdAt, uid, date, photoURL } = data;
const createdDate = createdAt?.toDate?.() ?? null;
    const card = document.createElement("div");
    card.className = "todo-card";
    const col = colorFrom(name);
    const avatarHTML = photoURL
      ? `<img src="${photoURL}" alt="${esc(name)}" referrerpolicy="no-referrer">`
      : initials(name);
    const avatarStyle = photoURL ? "" : `style="background:${col}"`;
    card.innerHTML = `
      <div class="avatar" ${avatarStyle}>${avatarHTML}</div>
      <div class="todo-body">
        <div class="todo-meta">
          <span class="todo-name">${esc(name)}</span>
          <span class="todo-time" data-ts="${createdDate?.toISOString()??""}"
${timeAgo(createdDate)}</span>
        </div>
        <p class="todo-text">${esc(text)}</p>
        ${
  (auth.currentUser && auth.currentUser.uid === uid)
    ? `<button onclick="deleteTodo('${id}')" style="margin-top:8px;color:red;">🗑 Delete</button>`
    : ""
}
      </div>`;
    return card;
  }

  setInterval(() => {
    document.querySelectorAll(".todo-time[data-ts]").forEach(el => {
      el.textContent = el.dataset.ts ? timeAgo(new Date(el.dataset.ts)) : "just now";
    });
  }, 30_000);

  // ── Google login ─────────────────────────────────────────
  async function handleGoogle() {
    hideAuthError();
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      if (e.code !== "auth/popup-closed-by-user") showAuthError(friendly(e.code));
    }
  }

  // ── Email login ──────────────────────────────────────────
  async function handleLogin() {
    const email = document.getElementById("login-email").value.trim();
    const pass  = document.getElementById("login-password").value;
    if (!email || !pass) { showAuthError("Please fill in all fields."); return; }
    setBtnLoading("login-btn", true);
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch (e) { showAuthError(friendly(e.code)); }
    finally { setBtnLoading("login-btn", false); }
  }

  // ── Email signup ─────────────────────────────────────────
  async function handleSignup() {
    const name  = document.getElementById("signup-name").value.trim();
    const email = document.getElementById("signup-email").value.trim();
    const pass  = document.getElementById("signup-password").value;
    if (!name || !email || !pass) { showAuthError("Please fill in all fields."); return; }
    if (pass.length < 6) { showAuthError("Password must be at least 6 characters."); return; }
    setBtnLoading("signup-btn", true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
    } catch (e) { showAuthError(friendly(e.code)); }
    finally { setBtnLoading("signup-btn", false); }
  }

  // ── Add todo ─────────────────────────────────────────────
  async function handleAddTodo() {
    const text = todoInput.value.trim();
    if (!text) { errorMsg.classList.add("show"); todoInput.focus(); return; }
    errorMsg.classList.remove("show");
    addBtn.disabled = true; addBtn.classList.add("loading");
    try {
      const user = auth.currentUser;
      const name = user.displayName || user.email.split("@")[0];
      await addDoc(todosRef, {
        name, text, uid: user.uid,
        photoURL: user.photoURL || null,
        createdAt: serverTimestamp()
      });
      todoInput.value = ""; todoInput.focus();
    } catch (e) { alert("Couldn't save todo. Please try again."); }
    finally { addBtn.disabled = false; addBtn.classList.remove("loading"); }
  }

  // ── Logout ───────────────────────────────────────────────
  async function handleLogout() { await signOut(auth); }

  // ── UI helpers ───────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById("login-form").style.display  = tab==="login"  ? "flex" : "none";
    document.getElementById("signup-form").style.display = tab==="signup" ? "flex" : "none";
    document.getElementById("tab-login").classList.toggle("active",  tab==="login");
    document.getElementById("tab-signup").classList.toggle("active", tab==="signup");
    hideAuthError();
  }
  function showAuthError(msg) { authError.textContent = msg; authError.classList.add("show"); }
  function hideAuthError()    { authError.classList.remove("show"); }
  function setBtnLoading(id, on) { const b = document.getElementById(id); b.disabled = on; b.classList.toggle("loading", on); }
  function friendly(code) {
    return {
      "auth/user-not-found":       "No account found with this email.",
      "auth/wrong-password":       "Incorrect password. Try again.",
      "auth/invalid-credential":   "Invalid email or password.",
      "auth/email-already-in-use": "Email already registered. Try logging in.",
      "auth/invalid-email":        "Please enter a valid email address.",
      "auth/weak-password":        "Password must be at least 6 characters.",
      "auth/too-many-requests":    "Too many attempts. Try again later.",
    }[code] || "Something went wrong. Please try again.";
}
  async function deleteTodo(id) {
  await deleteDoc(doc(db, "todos", id));
}
window.deleteTodo = deleteTodo;
// ── Expose to global ─────────────────────────────────────
window.handleGoogle   = handleGoogle;
window.handleLogin    = handleLogin;
window.handleSignup   = handleSignup;
window.handleLogout   = handleLogout;
window.switchTab      = switchTab;
window.handleAddTodo  = handleAddTodo;

  // Enter key support
  document.getElementById("login-password").addEventListener("keydown",  e => e.key==="Enter" && handleLogin());
  document.getElementById("signup-password").addEventListener("keydown", e => e.key==="Enter" && handleSignup());
  document.getElementById("todo-input").addEventListener("input", () => errorMsg.classList.remove("show"));
</script>

</body>
</html>
